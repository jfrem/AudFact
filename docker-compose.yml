services:
  php:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: audfact-php
    env_file:
      - .env
    volumes:
      - ./:/var/www/html
      - ./logs:/var/www/html/logs
    expose:
      - "9000"

  nginx:
    image: nginx:1.25-alpine
    container_name: audfact-nginx
    depends_on:
      - php
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
