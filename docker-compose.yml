services:
  php:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        ENABLE_XDEBUG: "0"
        WWWUSER_ID: ${WWWUSER_ID:-33}
        WWWGROUP_ID: ${WWWGROUP_ID:-33}
    # container_name has been REMOVED to allow replica scaling
    env_file:
      - .env
    # El código fuente se integra en la fase de build (Dockerfile).
    # Ya NO vinculamos ./:/var/www/html para mantener el entorno de producción inmutable y limpio.
    volumes:
      - ./logs:/var/www/html/logs
    expose:
      - "9000"
    deploy:
      replicas: 5
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      # Verificación real: carga app PHP + SELECT 1 contra SQL Server
      test: ["CMD", "php", "/var/www/html/docker/healthcheck.php"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    build:
      context: .
      dockerfile: docker/nginx.Dockerfile
    container_name: audfact-nginx
    depends_on:
      - php
    ports:
      - "8080:80"
    environment:
      # Solo sustituir variables que empiecen con AUDIT_
      NGINX_ENVSUBST_FILTER: "AUDIT_"
      AUDIT_NGINX_READ_TIMEOUT: ${AUDIT_NGINX_READ_TIMEOUT:-3600}
