services:
  php:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        ENABLE_XDEBUG: "1"
        WWWUSER_ID: ${WWWUSER_ID:-33}
        WWWGROUP_ID: ${WWWGROUP_ID:-33}
    env_file:
      - .env
    volumes:
      - ./:/var/www/html
      - ./logs:/var/www/html/logs
    expose:
      - "9000"
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    depends_on:
      - php
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
