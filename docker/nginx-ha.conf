upstream php_pool {
    # Least Connections strategy es crítica ante latencia asimétrica de IA
    least_conn;
    
    # Docker Compose DNS resuelve a todas las réplicas
    # El nombre del servicio es 'php' en el docker-compose.yml
    server php:9000;

    # Mantener conexiones persistentes con FPM
    keepalive 32;
}

server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    # Timeout para auditorías largas de IA (~25s + margen max de 120s estático FPM)
    fastcgi_read_timeout 120s;
    fastcgi_send_timeout 30s;
    proxy_connect_timeout 10s;

    location / {
        try_files $uri /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        
        # Apuntar al balanceador en lugar de una réplica directa
        fastcgi_pass php_pool;

        # Keepalive con FPM
        fastcgi_keep_conn on;
    }
}
