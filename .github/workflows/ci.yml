name: CI — AudFact

on:
  push:
    branches: [main, develop, "feature/*"]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: PHP Lint & Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_sqlsrv
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: PHP Syntax Check
        run: |
          echo "Checking PHP syntax..."
          find . -name "*.php" -not -path "./vendor/*" -print0 | xargs -0 -P4 php -l
          echo "All PHP files passed syntax check"

      - name: Validate composer.json
        run: composer validate --strict

      - name: Check project structure
        run: |
          echo "Validating project structure..."
          for dir in app/Controllers app/Models app/Services core public; do
            if [ ! -d "$dir" ]; then
              echo "Missing directory: $dir"
              exit 1
            fi
          done
          echo "Project structure is valid"

      - name: Check for secrets in code
        run: |
          echo "Scanning for hardcoded secrets..."
          ISSUES=$(grep -rn --include="*.php" -E "(password|secret|api_key)\s*=\s*['\"][^'\"]+['\"]" --exclude-dir=vendor . || true)
          if [ -n "$ISSUES" ]; then
            echo "Possible hardcoded secrets found:"
            echo "$ISSUES"
            echo "::warning::Potential hardcoded secrets detected in source files"
          else
            echo "No hardcoded secrets found"
          fi

      - name: Run PHPUnit Tests
        run: |
          echo "Running unit tests..."
          vendor/bin/phpunit --configuration phpunit.xml --testdox --colors=always
          echo "All tests passed"

  deploy:
    name: Deploy to Production
    needs: lint
    runs-on: [self-hosted, Linux, X64]
    concurrency:
      group: deploy-production-main
      cancel-in-progress: false
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Fix workspace permissions (Docker creates root-owned files)
        run: |
          echo "🔧 Reclaiming workspace ownership from root..."
          docker run --rm -v "$GITHUB_WORKSPACE":"$GITHUB_WORKSPACE" alpine chown -R $(id -u):$(id -g) "$GITHUB_WORKSPACE"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: true


      - name: Create .env from GitHub Secrets
        env:
          APP_ENV: ${{ secrets.APP_ENV }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          DB_ENCRYPT: ${{ secrets.DB_ENCRYPT }}
          DB_TRUST_SERVER_CERT: ${{ secrets.DB_TRUST_SERVER_CERT }}
          DB2_HOST: ${{ secrets.DB2_HOST }}
          DB2_PORT: ${{ secrets.DB2_PORT }}
          DB2_NAME: ${{ secrets.DB2_NAME }}
          DB2_USER: ${{ secrets.DB2_USER }}
          DB2_PASS: ${{ secrets.DB2_PASS }}
          GOOGLE_DRIVE_CLIENT_EMAIL: ${{ secrets.GOOGLE_DRIVE_CLIENT_EMAIL }}
          GOOGLE_DRIVE_PRIVATE_KEY: ${{ secrets.GOOGLE_DRIVE_PRIVATE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
          MCP_WEBHOOK_SECRET: ${{ secrets.MCP_WEBHOOK_SECRET }}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
          AUDIT_NGINX_READ_TIMEOUT: ${{ secrets.AUDIT_NGINX_READ_TIMEOUT }}
        run: |
          echo "Generating .env from GitHub Secrets..."

          required=(APP_ENV DB_HOST DB_PORT DB_NAME DB_USER DB_PASS DB2_HOST DB2_PORT DB2_NAME DB2_USER DB2_PASS GEMINI_API_KEY)
          for key in "${required[@]}"; do
            if [ -z "${!key}" ]; then
              echo "Missing required GitHub secret: $key"
              exit 1
            fi
          done

          cat > .env << EOF
          APP_ENV=${APP_ENV}
          WWWUSER_ID=$(id -u)
          WWWGROUP_ID=$(id -g)
          WRAP_API_BASE=http://nginx
          WEBHOOK_URL=http://localhost:8080/app/wrap/webhook.php
          CAPABILITIES_URL=http://localhost:8080/app/wrap/capabilities.php
          MCP_WEBHOOK_SECRET=${MCP_WEBHOOK_SECRET}

          DB_TYPE=sqlsrv
          DB_HOST=${DB_HOST}
          DB_PORT=${DB_PORT}
          DB_NAME=${DB_NAME}
          DB_USER=${DB_USER}
          DB_PASS=${DB_PASS}

          DB2_HOST=${DB2_HOST}
          DB2_PORT=${DB2_PORT}
          DB2_NAME=${DB2_NAME}
          DB2_USER=${DB2_USER}
          DB2_PASS=${DB2_PASS}

          DB_POOLING=1
          DB_ENCRYPT=${DB_ENCRYPT:-no}
          DB_TRUST_SERVER_CERT=${DB_TRUST_SERVER_CERT:-yes}

          GOOGLE_DRIVE_CLIENT_EMAIL=${GOOGLE_DRIVE_CLIENT_EMAIL}
          GOOGLE_DRIVE_PRIVATE_KEY="${GOOGLE_DRIVE_PRIVATE_KEY}"
          GOOGLE_DRIVE_TLS_VERIFY=1

          REQUEST_TIMEOUT_MS=60000
          LOG_LEVEL=${LOG_LEVEL:-info}
          LOG_RETENTION_DAYS=7
          LOG_MAX_SIZE_MB=10
          ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
          MAX_JSON_SIZE=1048576

          GEMINI_API_KEY=${GEMINI_API_KEY}
          GEMINI_MODEL=gemini-flash-latest
          GEMINI_TEMPERATURE=0.0
          GEMINI_TIMEOUT=300
          GEMINI_TOP_P=
          GEMINI_TOP_K=
          GEMINI_MAX_OUTPUT_TOKENS=8192
          GEMINI_RESPONSE_MIME=application/json
          GEMINI_MEDIA_RESOLUTION=
          GEMINI_THINKING_BUDGET=

          AUDIT_BATCH_MAX_LIMIT=100
          AUDIT_BATCH_TIMEOUT=3600
          AUDIT_NGINX_READ_TIMEOUT=${AUDIT_NGINX_READ_TIMEOUT:-3600}
          AUDIT_FPM_TERMINATE_TIMEOUT=3600
          EOF

          chmod 600 .env
          echo "Generated .env successfully"

      - name: Rebuild and Restart Containers
        run: |
          echo "Rebuilding containers locally on self-hosted runner..."
          mkdir -p logs
          docker compose down
          docker compose up --build -d

      - name: Health Check
        run: |
          echo "Waiting for containers to start (entrypoint installs vendor if needed)..."
          sleep 30
          RETRIES=3
          for i in $(seq 1 $RETRIES); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "Deploy successful — Health check passed"
              exit 0
            fi
            echo "Attempt $i/$RETRIES failed, waiting 10s..."
            sleep 10
          done
          echo "Health check failed after $RETRIES attempts"
          docker ps --format "table {{.Names}}\t{{.Status}}"
          docker compose logs --tail=120 php nginx
          exit 1

      - name: 🧹 Zero-Source Host Purge (Lean Production 3.0)
        if: success()
        run: |
          echo "Purging all source code and metadata from the deployment host..."
          if [ -z "$GITHUB_WORKSPACE" ] || [ "$GITHUB_WORKSPACE" = "/" ]; then
            echo "Invalid GITHUB_WORKSPACE, aborting purge."
            exit 1
          fi
          cd "$GITHUB_WORKSPACE"
          # Delete everything except essentials (.env, logs, docker-compose.yml, .git, docker, public, _temp/_actions metadata)
          find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 \
            ! -name 'logs' \
            ! -name '.env' \
            ! -name 'docker-compose.yml' \
            ! -name '.git' \
            ! -name 'docker' \
            ! -name 'public' \
            ! -name '_temp' \
            ! -name '_actions' \
            -print -exec rm -rf {} +
          echo "Host is now completely clean. Zero-source deployment achieved."
